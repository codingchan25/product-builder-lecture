<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>점심 메뉴 추천기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="theme-toggle">테마 변경</button>
    <div class="container">
        <h1>오늘 점심 뭐 먹지? 🤔</h1>
        <p>버튼을 눌러 메뉴를 추천받아보세요!</p>
        
        <div id="result">메뉴를 기다리는 중...</div>
        
        <button onclick="recommendMenu()">메뉴 추천 받기</button>
    </div>

    <script src="main.js"></script>

    <div class="container contact-form-container">
        <h2>제휴 문의</h2>
        <form action="https://formspree.io/f/mlgwwpdq" method="POST">
            <div class="form-group">
                <label for="name">이름:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">이메일:</label>
                <input type="email" id="email" name="_replyto" required>
            </div>
            <div class="form-group">
                <label for="message">메시지:</label>
                <textarea id="message" name="message" rows="5" required></textarea>
            </div>
            <button type="submit">문의하기</button>
        </form>
    </div>
</body>
</html>
